name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o site
        uses: actions/checkout@v6

      - name: Preparar os arquivos públicos
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -R Screenshots _site/
          touch _site/.nojekyll

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v6

      - name: Enviar os arquivos
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
